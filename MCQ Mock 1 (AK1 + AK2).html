            }
        ];

        // --- Main App Component ---
        function App() {
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);
            const [showExplanation, setShowExplanation] = useState(false);
            const [score, setScore] = useState(0);
            const [quizCompleted, setQuizCompleted] = useState(false);
            const [answers, setAnswers] = useState(new Array(questions.length).fill(null));

            const currentQuestion = questions[currentQuestionIndex];

            const handleOptionSelect = (index) => {
                if (answers[currentQuestionIndex] !== null) return; // Prevent changing answer
                
                setSelectedOption(index);
                const newAnswers = [...answers];
                newAnswers[currentQuestionIndex] = index;
                setAnswers(newAnswers);
                
                if (index === currentQuestion.correctIndex) {
                    setScore(score + 1);
                }
                setShowExplanation(true);
            };

            const nextQuestion = () => {
                if (currentQuestionIndex < questions.length - 1) {
                    setCurrentQuestionIndex(currentQuestionIndex + 1);
                    setSelectedOption(null);
                    setShowExplanation(false);
                } else {
                    setQuizCompleted(true);
                }
            };

            const restartQuiz = () => {
                setCurrentQuestionIndex(0);
                setSelectedOption(null);
                setShowExplanation(false);
                setScore(0);
                setQuizCompleted(false);
                setAnswers(new Array(questions.length).fill(null));
            };

            if (quizCompleted) {
                return (
                    <div className="min-h-screen bg-slate-50 p-6 flex items-center justify-center font-sans text-slate-800">
                        <div className="max-w-2xl w-full bg-white rounded-xl shadow-lg p-8 text-center">
                            <Activity className="w-16 h-16 mx-auto text-blue-600 mb-4" />
                            <h2 className="text-3xl font-bold mb-4 text-slate-900">Assessment Complete!</h2>
                            <p className="text-xl mb-6">You scored <span className="font-bold text-blue-600">{score}</span> out of <span className="font-bold">{questions.length}</span></p>
                            
                            <div className="w-full bg-slate-200 rounded-full h-4 mb-8">
                                <div 
                                    className="bg-blue-600 h-4 rounded-full transition-all duration-1000" 
                                    style={{ width: `${(score / questions.length) * 100}%` }}
                                ></div>
                            </div>

                            <p className="text-slate-600 mb-8">
                                {score >= 25 ? "Excellent distinction-level performance!" : 
                                 score >= 15 ? "Good pass. Keep reviewing the weaker areas." : 
                                 "Keep studying! Review the core AK1 & AK2 notes."}
                            </p>
                            
                            <button 
                                onClick={restartQuiz}
                                className="flex items-center justify-center gap-2 mx-auto bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-lg transition-colors"
                            >
                                <RotateCcw size={20} /> Restart Assessment
                            </button>
                        </div>
                    </div>
                );
            }

            const isCorrect = selectedOption === currentQuestion.correctIndex;

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col font-sans text-slate-800">
                    {/* Header */}
                    <header className="bg-white shadow-sm px-6 py-4 flex justify-between items-center sticky top-0 z-10">
                        <div className="flex items-center gap-2">
                            <Brain className="text-blue-600" size={24} />
                            <h1 className="font-bold text-xl text-slate-900 hidden sm:block">Year 1 Med Assessment</h1>
                            <span className="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded ml-2">SBA Mode</span>
                        </div>
                        <div className="flex items-center gap-4 text-sm font-medium">
                            <span className="text-slate-500">Q {currentQuestionIndex + 1} / {questions.length}</span>
                            <span className="bg-slate-100 px-3 py-1 rounded-full text-slate-700">Score: {score}</span>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-grow p-4 sm:p-6 max-w-4xl mx-auto w-full">
                        
                        {/* Progress Bar */}
                        <div className="w-full bg-slate-200 rounded-full h-1.5 mb-6">
                            <div 
                                className="bg-blue-600 h-1.5 rounded-full transition-all duration-300" 
                                style={{ width: `${((currentQuestionIndex + 1) / questions.length) * 100}%` }}
                            ></div>
                        </div>

                        {/* Question Card */}
                        <div className="bg-white rounded-xl shadow-md overflow-hidden border border-slate-200">
                            
                            {/* Category Badge */}
                            <div className="bg-slate-50 px-6 py-3 border-b border-slate-100 flex items-center gap-2">
                                {currentQuestion.category === "Anatomy" && <BookOpen size={16} className="text-purple-500"/>}
                                {currentQuestion.category === "Physiology" && <Activity size={16} className="text-red-500"/>}
                                {currentQuestion.category === "Pharmacology" && <Zap size={16} className="text-yellow-500"/>}
                                {currentQuestion.category === "Global Health" && <Globe size={16} className="text-green-500"/>}
                                {currentQuestion.category === "Ethics" && <Shield size={16} className="text-blue-500"/>}
                                <span className="text-xs font-bold uppercase tracking-wider text-slate-500">{currentQuestion.category}</span>
                            </div>

                            <div className="p-6 sm:p-8">
                                {/* Stem */}
                                <div className="mb-6">
                                    <p className="text-lg sm:text-xl text-slate-800 leading-relaxed">{currentQuestion.stem}</p>
                                </div>

                                {/* Lead-in */}
                                <div className="mb-6">
                                    <p className="font-semibold text-slate-900">{currentQuestion.leadIn}</p>
                                </div>

                                {/* Options */}
                                <div className="space-y-3">
                                    {currentQuestion.options.map((option, index) => {
                                        let optionStyle = "border-slate-200 hover:border-blue-300 hover:bg-blue-50";
                                        let icon = null;

                                        if (answers[currentQuestionIndex] !== null) {
                                            if (index === currentQuestion.correctIndex) {
                                                optionStyle = "border-green-500 bg-green-50 text-green-800 ring-1 ring-green-500";
                                                icon = <CheckCircle size={20} className="text-green-600" />;
                                            } else if (index === selectedOption) {
                                                optionStyle = "border-red-300 bg-red-50 text-red-800";
                                                icon = <XCircle size={20} className="text-red-500" />;
                                            } else {
                                                optionStyle = "border-slate-100 opacity-50";
                                            }
                                        } else if (selectedOption === index) {
                                            optionStyle = "border-blue-500 bg-blue-50 ring-1 ring-blue-500";
                                        }

                                        return (
                                            <button
                                                key={index}
                                                onClick={() => handleOptionSelect(index)}
                                                disabled={answers[currentQuestionIndex] !== null}
                                                className={`w-full text-left p-4 rounded-lg border-2 transition-all duration-200 flex justify-between items-center group ${optionStyle}`}
                                            >
                                                <span className="font-medium">{option}</span>
                                                {icon}
                                            </button>
                                        );
                                    })}
                                </div>

                                {/* Explanation Section */}
                                {showExplanation && (
                                    <div className={`mt-8 p-6 rounded-lg border-l-4 animation-fade-in ${isCorrect ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'}`}>
                                        <h3 className={`font-bold mb-2 flex items-center gap-2 ${isCorrect ? 'text-green-800' : 'text-red-800'}`}>
                                            {isCorrect ? <CheckCircle size={20}/> : <XCircle size={20}/>}
                                            {isCorrect ? "Correct!" : "Incorrect"}
                                        </h3>
                                        <p className="text-slate-700 leading-relaxed">
                                            {currentQuestion.explanation}
                                        </p>
                                    </div>
                                )}
                                
                                {/* Next Button */}
                                {showExplanation && (
                                    <div className="mt-8 flex justify-end">
                                        <button
                                            onClick={nextQuestion}
                                            className="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg flex items-center gap-2 transition-colors shadow-sm"
                                        >
                                            {currentQuestionIndex === questions.length - 1 ? "Finish Assessment" : "Next Question"}
                                            <ChevronRight size={20} />
                                        </button>
                                    </div>
                                )}

                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
